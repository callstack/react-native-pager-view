appId: com.pagerviewexample
---
- runFlow: nested_pagerView_example_setup.yaml

- swipe:
    from:
      id: 'pager-view'
    start: 90%, 50%
    end: 10%, 50%
    duration: 500
- assertVisible: 'Horizontal page number 0'

- swipe:
    from:
      id: '2-nd-nested'
    start: 90%, 50%
    end: 10%, 50%
    duration: 500
- assertVisible: 'Horizontal page number 1'

- swipe:
    from:
      id: '2-nd-nested'
    start: 50%, 90%
    end: 50%, 60%
    duration: 500
- assertVisible: 'Vertical page number 1'

- swipe:
    from:
      id: '2-nd-nested'
    start: 90%, 50%
    end: 10%, 50%
    duration: 500
- assertVisible:
    id: '3-rd-pager-view'
